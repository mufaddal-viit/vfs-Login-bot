[browser]
type = chromium
headless = false
cdp_url = http://127.0.0.1:9222

[vfs-credential]
email = melicentsignificant@web-library.net
password = Dubai@12300

[booking]
; Values to pick on the "Appointment Details" step after Start New Booking.
; Put the exact (or partial) option text shown in each dropdown.
; A substring is enough, e.g. "New Delhi" matches the full centre name.
; Leave all blank to stop right after clicking Start New Booking.
application_centre = Abu Dhabi
appointment_category = short Stay
sub_category = Business

; Tourist/Family Visit
; Step 3 "Book Appointment" — preferred date as YYYY-MM-DD (e.g. 2026-06-05)
; and time as HH:MM (e.g. 09:00). Leave blank to pick the earliest date /
; the first available time slot.
appointment_date =
appointment_time =


[otp]
; Which OTP tool to use by default: imap | mailtm.
; Override per run with the --otp-tool / -o command-line flag.
provider = imap
; (imap only) Gmail APP PASSWORD for [vfs-credential].email. The OTP mailbox
; username is ALWAYS [vfs-credential].email — there is only one email.
mail_pass = uswzhhbwxvgkqmej
; Optional filters to match the OTP email (recommended once you know the sender).
; e.g. sender = vfsglobal   subject = OTP
sender =
subject =
; How long to wait for the OTP mail (seconds) and how recent it must be (minutes).
timeout = 90
since_min = 5

[applicant]
; Step 2 "Your Details" — Applicant 1. Nationality must be the exact country
; name as it appears in the dropdown (e.g. India).
; Leave all blank to stop after Step 1 (clicking Continue).
first_name = mufaddal
last_name = calcutta
nationality = india
passport_number = 9s9s923j0

; --- Extra fields for portals that ask for them (e.g. UAE -> Luxembourg) ---
; Gender must match the dropdown option text (e.g. Male / Female).
gender = Male
; Dates in DD/MM/YYYY format.
date_of_birth = 02/06/1995
passport_expiry_date = 02/06/2030
; Contact number: country dialling code (no '+') and the number.
country_code = 971
contact_number = 501234567
; Email — leave blank to reuse the [vfs-credential] login email (recommended).
email =

[insurance]
; Travel Insurance step (UAE -> Luxembourg portal only). Address fields are
; required; the bot fills them, picks the country of entry, fills the travel
; dates, leaves Coverage type on the pre-selected 'Schengen', then clicks
; 'Get quote' to advance to the Review step.
; Leave address_line1 blank to skip the whole insurance step (just Get quote).
address_line1 = Flat 101, Building A
address_line2 = Marina District
state = Dubai
city = Dubai
postcode = 00000
; Travel dates in DD/MM/YYYY format.
start_date = 01/07/2026
end_date = 15/07/2026
; Country of entry must match a dropdown option (e.g. Luxembourg).
country_of_entry = Luxembourg
; Coverage type: Schengen | Worldwide (Schengen is pre-selected by VFS).
coverage_type = Schengen


